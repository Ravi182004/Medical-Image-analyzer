<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Chatbot - MedScan AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root,[data-theme="dark"] {
            --bg:#080E1A; --surface:#0F1827; --surface2:#152030;
            --border:rgba(255,255,255,0.07); --border-active:rgba(32,201,181,0.4);
            --accent:#20C9B5; --accent2:#3B82F6; --text:#F0F4FF; --muted:#8899AA;
            --danger:#FF5E7E; --success:#34D399;
            --nav-bg:rgba(8,14,26,0.88); --grid-line:rgba(32,201,181,0.03);
            --tag-bg:rgba(32,201,181,0.08); --tag-bd:rgba(32,201,181,0.2);
            --toggle-bg:#152030; --toggle-bd:rgba(255,255,255,0.12);
        }
        [data-theme="light"] {
            --bg:#F4F7FB; --surface:#FFFFFF; --surface2:#EEF2F8;
            --border:rgba(0,0,0,0.08); --border-active:rgba(12,158,145,0.35);
            --accent:#0C9E91; --accent2:#2563EB; --text:#0B1F3A; --muted:#5A6A82;
            --danger:#D63F5E; --success:#1A9E6A;
            --nav-bg:rgba(244,247,251,0.92); --grid-line:rgba(12,158,145,0.04);
            --tag-bg:rgba(12,158,145,0.07); --tag-bd:rgba(12,158,145,0.18);
            --toggle-bg:#E8EDF5; --toggle-bd:rgba(0,0,0,0.1);
        }
        html{transition:background 0.3s;}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background 0.3s,color 0.3s;}
        body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
        nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;transition:background 0.3s,border-color 0.3s;}
        .nav-logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:10px;}
        .nav-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:#fff;}
        .nav-right{display:flex;align-items:center;gap:4px;}
        .nav-links{display:flex;gap:4px;}
        .nav-links a{color:var(--muted);text-decoration:none;font-size:0.83rem;font-weight:500;padding:6px 14px;border-radius:8px;transition:all 0.2s;}
        .nav-links a:hover{color:var(--text);background:var(--surface2);}
        .theme-toggle{width:36px;height:36px;background:var(--toggle-bg);border:1px solid var(--toggle-bd);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all 0.2s;margin-left:8px;user-select:none;}
        .theme-toggle:hover{border-color:var(--accent);transform:scale(1.08);}
        .page{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:56px 24px 80px;}
        .divider{border:none;border-top:1px solid var(--border);margin:28px 0;}
        .btn-back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);border:1px solid var(--border);padding:10px 20px;border-radius:10px;font-size:0.87rem;font-weight:500;text-decoration:none;transition:all 0.2s;}
        .btn-back:hover{color:var(--text);border-color:var(--border-active);}
        .fade-in{animation:fadeIn 0.5s ease forwards;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

        .page-header{text-align:center;margin-bottom:40px;}
        .page-icon{width:64px;height:64px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 20px;}
        .page-header h2{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--text);margin-bottom:8px;}
        .page-header p{font-size:0.87rem;color:var(--muted);}

        .section-label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
        .section-label::before{content:'';display:block;width:3px;height:14px;background:var(--accent);border-radius:4px;}

        .questions-container{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px;}
        .q-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'Inter',sans-serif;font-size:0.82rem;font-weight:500;padding:9px 16px;border-radius:100px;cursor:pointer;transition:all 0.2s;}
        .q-btn:hover{border-color:var(--border-active);color:var(--text);background:var(--tag-bg);}
        .q-btn.active{border-color:var(--accent);color:var(--accent);background:var(--tag-bg);}

        .answer-box{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:24px;min-height:100px;transition:all 0.3s;}
        .answer-box.has-answer{border-color:var(--tag-bd);background:var(--tag-bg);}
        .answer-placeholder{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:0.88rem;}
        .answer-placeholder-icon{width:32px;height:32px;background:var(--surface);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;}
        .answer-content{display:none;}
        .answer-q{font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);margin-bottom:10px;}
        .answer-a{font-size:0.95rem;color:var(--text);line-height:1.7;}
        .bottom-bar{text-align:center;margin-top:28px;}
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-logo"><div class="nav-logo-icon">✚</div>MedScan AI</a>
    <div class="nav-right">
        <div class="nav-links">
            <a href="/bmi">BMI</a><a href="/chatbot">Chatbot</a><a href="/history">History</a><a href="/about">About</a>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle light/dark mode">☀️</button>
    </div>
</nav>
<div class="page fade-in">
    <div class="page-header">
        <div class="page-icon">💬</div>
        <h2>Healthcare Chatbot</h2>
        <p>Select a question below to get instant health information</p>
    </div>
    <div class="section-label">Common Questions</div>
    <div class="questions-container">
        {% for question in qa.keys() %}
        <button class="q-btn" data-question="{{ question }}" onclick="showAnswer(this)">{{ question }}</button>
        {% endfor %}
    </div>
    <div class="section-label">Answer</div>
    <div class="answer-box" id="answer-box">
        <div class="answer-placeholder" id="answer-placeholder">
            <div class="answer-placeholder-icon">💡</div>
            Click a question above to see the answer
        </div>
        <div class="answer-content" id="answer-content">
            <div class="answer-q" id="answer-q"></div>
            <div class="answer-a" id="answer-a"></div>
        </div>
    </div>
    <div class="bottom-bar"><a href="/" class="btn-back">← Back to Home</a></div>
</div>
<script>
    const THEME_KEY='medscan-theme';
    function applyTheme(t){document.documentElement.setAttribute('data-theme',t);const b=document.getElementById('themeBtn');if(b)b.textContent=t==='dark'?'☀️':'🌙';localStorage.setItem(THEME_KEY,t);}
    function toggleTheme(){applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
    applyTheme(localStorage.getItem(THEME_KEY)||'dark');

    const answers=JSON.parse('{{ qa | tojson | safe }}');
    function showAnswer(el){
        document.querySelectorAll('.q-btn').forEach(b=>b.classList.remove('active'));
        el.classList.add('active');
        const q=el.getAttribute('data-question');
        document.getElementById('answer-placeholder').style.display='none';
        document.getElementById('answer-content').style.display='block';
        document.getElementById('answer-q').textContent=q;
        document.getElementById('answer-a').textContent=answers[q];
        document.getElementById('answer-box').classList.add('has-answer');
    }
</script>
</body>
</html>
